name: CI Pipeline

on:
  push:
    branches:
      - '*'     # veiks visose šakose
  pull_request:
    branches:
      - '*'
      

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: autopick_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      OPENAI_API_KEY: dummy-key
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: autopick_db
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: 3306

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd backend
          PYTHONPATH=.. pytest --maxfail=3 --disable-warnings -q
